services:
  db:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_PASSWORD: "12345"
      PGDATA: "/data/postgres"
      # POSTGRES_HOST_AUTH_METHOD: "trust"
    ports:
      - "5332:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "postgres"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

volumes:
  postgres-data: {}