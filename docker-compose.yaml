services:
  api:
    container_name: sudoku_api
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - local.env
    environment:
      DATABASE_HOST: "db"
  migrate:
    build: .
    depends_on:
      - db
    entrypoint: ["migrate"]
    env_file:
      - local.env
    environment:
      DATABASE_HOST: "db"
  db:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_PASSWORD: "12345"
      PGDATA: "/data/postgres"
    ports:
      - "5332:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "postgres"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

networks:
  default:
    driver: bridge

volumes:
  postgres-data: {}