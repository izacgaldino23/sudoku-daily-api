name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_REPO || format('{0}/sudoku-daily-api', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Short SHA
        id: sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger infra deploy
        run: |
          curl -s -X POST https://api.github.com/repos/${{ github.repository_owner }}/sudoku-daily-infra/dispatches \
            -H "Authorization: Bearer ${{ secrets.INFRA_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"deploy","client_payload":{"service":"api","tag":"${{ steps.sha.outputs.sha }}"}}'
