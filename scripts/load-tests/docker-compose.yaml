services:
  db-load:
    container_name: postgres_load
    image: postgres
    environment:
      POSTGRES_PASSWORD: "12345"
      PGDATA: "/data/postgres"
    ports:
      - "5334:5432"
    volumes:
      - postgres-load-data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "postgres"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  migrate-load:
    container_name: sudoku_migrate_load
    build: ../..
    depends_on:
      db-load:
        condition: service_healthy
    entrypoint: ["migrate"]
    env_file:
      - ../../local.env
    environment:
      DATABASE_HOST: "db-load"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "sudoku_load"

  api-load:
    container_name: sudoku_api_load
    build: ../..
    ports:
      - "8081:8080"
    depends_on:
      migrate-load:
        condition: service_completed_successfully
    env_file:
      - ../../local.env
    environment:
      DATABASE_HOST: "db-load"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "sudoku_load"
      DEBUG: "true"
      LIMITS_MAX_REQUEST_COUNT_GLOBAL: 10000
      LIMITS_MAX_REQUEST_COUNT_USER: 10000

  vegeta:
    build: .
    volumes:
      - ./:/scripts
      - ../../load-reports:/reports
    entrypoint: ["/bin/sh", "/scripts/run-load-tests.sh"]
    depends_on:
      - api-load
    environment:
      - API_URL=http://api-load:8080
    networks:
      - default

  pghero:
    image: ankane/pghero
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=postgres://postgres:12345@db-load:5432/sudoku_load
    depends_on:
      - db-load
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  postgres-load-data: {}
